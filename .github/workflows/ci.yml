name: CI

on:
  push:
    branches: [develop, v2.0-rewrite]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm vitest run --coverage
      - name: Check package size
        run: |
          SIZE=$(pnpm pack --pack-gzip-level 9 2>/dev/null | xargs wc -c | awk '{print $1}')
          echo "Package size: ${SIZE} bytes"
          if [ "$SIZE" -gt 30000 ]; then
            echo "::error::Package size ${SIZE} bytes exceeds 30KB limit"
            exit 1
          fi
          rm -f *.tgz
