name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Skip commits semantic-release would produce itself (belt-and-braces —
    # we no longer commit back to main, but leave the guard in place).
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    permissions:
      contents: write        # creating git tags and GitHub releases
      issues: write          # semantic-release opens issues on failure
      pull-requests: write
      id-token: write        # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile

      # Re-run the gate before publishing so a red build never reaches npm,
      # even if somebody merged past branch protection.
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test:coverage
      - name: Build
        run: pnpm build

      - name: Record pre-release tag
        id: pre
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Release (semantic-release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release

      - name: Detect new release
        id: release
        run: |
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
          if [ "$NEW_TAG" != "${{ steps.pre.outputs.tag }}" ] && [ "$NEW_TAG" != "none" ]; then
            VERSION="${NEW_TAG#v}"
            MAJOR="${VERSION%%.*}"
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Snapshot docs for release
        if: steps.release.outputs.published == 'true'
        run: |
          rm -rf docs/v${{ steps.release.outputs.major }}
          cp -r docs/next docs/v${{ steps.release.outputs.major }}
          rm -f docs/latest
          ln -s v${{ steps.release.outputs.major }} docs/latest

      - name: Build and deploy docs
        if: steps.release.outputs.published == 'true'
        run: pnpm docs:build

      - name: Deploy to GitHub Pages
        if: steps.release.outputs.published == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
